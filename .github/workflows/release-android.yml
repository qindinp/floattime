# ==============================================================
# FloatTime Release - 发布构建流程
# Node.js 24 compatible actions
# ==============================================================
name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.3.1)'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-cache-enabled: true
          cache-write-enabled: true
          dependency-graph: generate

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "ver=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "ver=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "FloatTime-${{ steps.version.outputs.ver }}-release.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: FloatTime-release-apk
          path: FloatTime-*-release.apk
          retention-days: 365

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FloatTime-*-release.apk
          generate_release_notes: true
