name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 在 job 级别设置环境变量
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build web app
        run: npx vite build
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Sync Capacitor
        run: npx cap sync android
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Create debug keystore
        run: |
          cd android/app
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=FloatTime, OU=Debug, O=FloatTime, L=Beijing, ST=Beijing, C=CN"

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FloatTime-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
